<script>
window.addEventListener('error', function(event) {
  if (event.message === 'Script error.' || (event.filename && event.filename.includes('effectivecpmnetwork'))) {
    event.preventDefault();
    event.stopImmediatePropagation();
    return;
  }
  fetch('/api/log_error', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: event.message, filename: event.filename, lineno: event.lineno, colno: event.colno, error: event.error ? event.error.stack : null })
  });
}, true); // use capture mode to intercept before platform listener

window.addEventListener('unhandledrejection', function(event) {
  if (event.reason && event.reason.message === 'Script error.') {
    event.preventDefault();
    event.stopImmediatePropagation();
    return;
  }
  fetch('/api/log_error', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: event.reason ? event.reason.message : 'unhandled rejection', error: event.reason ? event.reason.stack : null })
  });
}, true);
</script>
